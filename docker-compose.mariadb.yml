version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: docker-registry-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=registry_root_password
      - MYSQL_DATABASE=registry
      - MYSQL_USER=registry
      - MYSQL_PASSWORD=registry_password
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mariadb
    image: docker-registry-mariadb:latest
    container_name: docker-registry-mariadb-app
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - DB_DRIVER=mysql
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=registry_root_password
      - DB_NAME=registry
      - JWT_SECRET=docker-registry-secret-key-change-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - ADMIN_EMAIL=admin@localhost
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mariadb-data:
    driver: local